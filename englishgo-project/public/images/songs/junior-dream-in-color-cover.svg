<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Dream in Color cover</title>
  <desc id="desc">A vivid K-Pop style album cover with an open book exploding into colorful shapes and the words Dream in Color.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b2d74"/>
      <stop offset=".32" stop-color="#079260"/>
      <stop offset=".65" stop-color="#f05a24"/>
      <stop offset="1" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" x2="1">
      <stop offset="0" stop-color="#ff407f"/>
      <stop offset="1" stop-color="#a62d76"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1">
      <stop offset="0" stop-color="#ff8a00"/>
      <stop offset="1" stop-color="#f04316"/>
    </linearGradient>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .16"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000" flood-opacity=".38"/>
    </filter>
  </defs>

  <rect width="900" height="900" fill="url(#bg)"/>
  <g opacity=".78">
    <path d="M-40 190 250 35 185 305z" fill="#0050b8"/>
    <path d="M80 780 310 410 -40 520z" fill="#0b5cc6"/>
    <path d="M705-40 940 70 610 315z" fill="#ff9a1f"/>
    <path d="M930 315 660 480 930 640z" fill="#0b0b0b"/>
    <path d="M-50 430 210 365 10 560z" fill="#00955f"/>
    <path d="M690 850 950 690 850 930z" fill="#0f62c9"/>
  </g>

  <g fill="none" stroke="#0a0a0a" stroke-width="22" stroke-linecap="round" opacity=".9">
    <path d="M62 150 170 140"/>
    <path d="M742 118 845 70"/>
    <path d="M745 492 865 472"/>
    <path d="M92 692 218 650"/>
    <path d="M540 84 640 32"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M450 458 185 240 362 410z" fill="#f9efe2" stroke="#101010" stroke-width="10"/>
    <path d="M450 458 705 240 538 410z" fill="#f9efe2" stroke="#101010" stroke-width="10"/>
    <path d="M450 458 246 272 395 440z" fill="#f95f87" stroke="#101010" stroke-width="8"/>
    <path d="M450 458 318 198 424 443z" fill="#00b789" stroke="#101010" stroke-width="8"/>
    <path d="M450 458 414 138 458 445z" fill="#ffd343" stroke="#101010" stroke-width="8"/>
    <path d="M450 458 501 137 481 446z" fill="#ff5a1e" stroke="#101010" stroke-width="8"/>
    <path d="M450 458 610 170 505 442z" fill="#2458c9" stroke="#101010" stroke-width="8"/>
    <path d="M450 458 720 262 520 430z" fill="#ec2b8a" stroke="#101010" stroke-width="8"/>
    <path d="M450 458 694 382 518 474z" fill="#02a66a" stroke="#101010" stroke-width="8"/>
    <path d="M450 458 594 548 492 492z" fill="#8b46d8" stroke="#101010" stroke-width="8"/>
    <path d="M450 458 318 556 415 490z" fill="#ff7a00" stroke="#101010" stroke-width="8"/>
  </g>

  <g opacity=".95">
    <circle cx="696" cy="115" r="66" fill="#083e63"/>
    <circle cx="785" cy="254" r="38" fill="#101010"/>
    <circle cx="123" cy="525" r="74" fill="#101010"/>
    <circle cx="744" cy="716" r="54" fill="#0e7a58"/>
  </g>

  <text x="34" y="138" font-family="Impact, Anton, Arial Black, sans-serif" font-size="128" font-weight="900" letter-spacing="-7" fill="url(#pink)">DREAM</text>
  <text x="52" y="678" font-family="Georgia, serif" font-size="94" font-style="italic" fill="#fff7de">in</text>
  <text x="28" y="842" font-family="Impact, Anton, Arial Black, sans-serif" font-size="170" font-weight="900" letter-spacing="-9" fill="url(#orange)">COLOR</text>

  <circle cx="450" cy="450" r="74" fill="#262629" opacity=".96"/>
  <path d="M429 410v80l68-40z" fill="#f6f7f4"/>
  <rect width="900" height="900" fill="#000" opacity=".08" filter="url(#rough)"/>
  <rect x="10" y="10" width="880" height="880" fill="none" stroke="#ffffff" stroke-opacity=".16" stroke-width="3"/>
</svg>
