<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Taipei Cipher cover</title>
  <desc id="desc">A gritty Taipei hip-hop album cover with a folded cipher map, street textures, and bold Taipei Cipher lettering.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f1ead8"/>
      <stop offset=".55" stop-color="#b7a78d"/>
      <stop offset="1" stop-color="#5d5146"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" x2="1">
      <stop offset="0" stop-color="#be4b32"/>
      <stop offset="1" stop-color="#e08342"/>
    </linearGradient>
    <filter id="grit">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .23"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <filter id="drop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000" flood-opacity=".42"/>
    </filter>
  </defs>

  <rect width="900" height="900" fill="#1f1f1d"/>
  <path d="M0 0h180L92 170H0z" fill="#7d3d2f"/>
  <path d="M740 0h160v250l-92-42z" fill="#7f6b4f"/>
  <path d="M0 590l132 42L48 900H0z" fill="#2d5b78"/>
  <path d="M900 510v390H740l38-310z" fill="#984931"/>
  <path d="M650 30l235 38-42 98-172-36z" fill="#d37b46" opacity=".8"/>
  <path d="M675 610l215-36v126l-255 54z" fill="#213d4d" opacity=".9"/>

  <g filter="url(#drop)">
    <path d="M190 132 450 86v354L190 382z" fill="url(#paper)" stroke="#151515" stroke-width="8"/>
    <path d="M450 86 710 132v250L450 440z" fill="url(#paper)" stroke="#151515" stroke-width="8"/>
    <path d="M190 132l82 50v220l-82-20z" fill="#c64d37" opacity=".75"/>
    <path d="M710 132l-82 50v220l82-20z" fill="#d47b42" opacity=".72"/>
    <path d="M450 86v354" stroke="#151515" stroke-width="8"/>
    <path d="M260 164l76 58-82 82 90 72-42 38M380 132l-54 112 76 42-74 112M528 132l62 100-82 58 88 96-54 32" fill="none" stroke="#151515" stroke-width="18" stroke-linecap="square" stroke-linejoin="miter"/>
    <path d="M228 206l160 34M514 236l158-34M230 318l168-46M508 272l166 50M288 390l84-150M540 390l70-168" fill="none" stroke="#e6dfd0" stroke-width="9" opacity=".75"/>
  </g>

  <circle cx="450" cy="415" r="78" fill="#4b4b49" opacity=".95"/>
  <path d="M428 372v86l72-43z" fill="#f3f1e8"/>

  <g opacity=".8" fill="none" stroke-linecap="round">
    <path d="M52 86c108-28 208-34 320-22" stroke="#e7d8be" stroke-width="3"/>
    <path d="M595 70c78-34 158-44 245-24" stroke="#e7d8be" stroke-width="3"/>
    <path d="M80 810c212-34 470-28 760 8" stroke="#f2ead7" stroke-width="4"/>
    <path d="M52 828c280-22 548-16 798 18" stroke="#77716a" stroke-width="3"/>
  </g>

  <text x="111" y="692" font-family="Impact, Anton, Arial Black, sans-serif" font-size="112" font-weight="900" letter-spacing="2" fill="#d2b893" stroke="#141414" stroke-width="6">TAIPEI</text>
  <text x="105" y="810" font-family="Impact, Anton, Arial Black, sans-serif" font-size="116" font-weight="900" letter-spacing="-1" fill="#c7ad89" stroke="#141414" stroke-width="7">CIPHER</text>

  <rect width="900" height="900" fill="#000" opacity=".18" filter="url(#grit)"/>
  <rect x="12" y="12" width="876" height="876" rx="28" fill="none" stroke="#f4ead9" stroke-opacity=".16" stroke-width="3"/>
</svg>
