        <h1 style="font-size:28px;margin-bottom:8px">📘 EnglishGo — 專為台灣學生設計的英語學習平台</h1>
        <p style="color:#666;margin-bottom:24px">免費線上英語學習工具，涵蓋小學、國中、高中共 4,400+ 個單字，結合 SRS 間隔重複記憶法、AI 家教、口說練習等 11 種學習模式。</p>

        <h2 style="font-size:20px;margin:24px 0 8px">🎯 學習功能</h2>
        <p><strong>🃏 SRS 單字卡</strong> — 採用 Anki 間隔重複演算法，根據你的記憶程度自動安排復習時間，搭配音效、動畫和連擊系統，讓背單字不再枯燥。</p>
        <p><strong>🗣️ 口說練習</strong> — 透過語音辨識技術，系統會朗讀英文句子，孩子跟著唸，AI 即時逐字比對發音準確度，70% 以上算通過。台灣學生最缺的就是口說練習！</p>
        <p><strong>🔨 打地鼠拼字</strong> — 限時拼字遊戲，畫面顯示中文意思，孩子要在時間內按正確順序點擊字母拼出單字。小學 15 秒、國中 12 秒、高中 10 秒。</p>
        <p><strong>🎴 配對翻牌</strong> — 經典記憶遊戲，12 張牌面朝下，翻兩張找到英文和中文的配對。訓練瞬間記憶力和英中對照能力。</p>
        <p><strong>📝 單字測驗</strong> — 四選一測驗，從雲端單字庫隨機出題，即時回饋答對答錯。</p>
        <p><strong>🎧 聽寫訓練</strong> — 聽英文句子，打出你聽到的內容。支援慢速、正常、快速三種語速。</p>
        <p><strong>🧩 句子重組</strong> — 把打散的英文單字重新排列成正確的句子，訓練英文語感和語序。</p>
        <p><strong>🧠 文法學堂</strong> — 依等級整理重要文法規則，搭配例句和小測驗。</p>

        <h2 style="font-size:20px;margin:24px 0 8px">📚 單字庫涵蓋範圍</h2>
        <p>本平台收錄超過 <strong>4,400 個英文單字</strong>，依據台灣教育部課綱及大考中心 (CEEC) 參考字表分級：</p>
        <ul style="margin:8px 0 8px 24px">
          <li><strong>小學等級</strong>：約 334 個基礎單字（apple, happy, school, friend 等日常用字）</li>
          <li><strong>國中等級</strong>：約 1,368 個單字（environment, experience, communicate 等常用字）</li>
          <li><strong>高中等級</strong>：約 2,838 個進階單字（comprehensive, unprecedented, sustainable 等學測指考字彙）</li>
        </ul>
        <p>每個單字包含：英文、音標、詞性、中文翻譯、詞性變化、常見搭配、例句及例句翻譯。</p>

        <h2 style="font-size:20px;margin:24px 0 8px">📖 學習方法：SRS 間隔重複記憶法</h2>
        <p>SRS（Spaced Repetition System）是科學證實最有效的記憶方法。原理很簡單：</p>
        <ul style="margin:8px 0 8px 24px">
          <li><strong>記得的單字</strong>：間隔越來越長才復習（1天→3天→7天→14天）</li>
          <li><strong>忘記的單字</strong>：立刻重新開始，短間隔密集復習</li>
          <li>每天只需 <strong>10-15 分鐘</strong>，比傳統死背效率高 3-5 倍</li>
        </ul>
        <p>EnglishGo 的 SRS 系統讓你用四個按鈕評估記憶程度：Again（完全不記得）、Hard（有點印象）、Good（記得）、Easy（很簡單）。系統會自動調整每張卡片的出現頻率。</p>

        <h2 style="font-size:20px;margin:24px 0 8px">🗣️ 為什麼台灣學生需要口說練習？</h2>
        <p>台灣英語教育長期偏重讀寫，學生普遍「看得懂、寫得出，但說不出口」。EnglishGo 的口說練習模組利用瀏覽器內建的語音辨識技術（Web Speech API），讓孩子在家就能練習英文發音：</p>
        <ul style="margin:8px 0 8px 24px">
          <li>系統先朗讀英文 → 孩子跟著唸 → AI 即時判斷</li>
          <li>逐字比對：綠色代表說對、紅色代表需加強</li>
          <li>準確度 70% 以上算通過，獲得經驗值獎勵</li>
          <li>支援 Chrome 和 Edge 瀏覽器</li>
        </ul>

        <h2 style="font-size:20px;margin:24px 0 8px">🎮 遊戲化學習，讓孩子愛上英文</h2>
        <p>EnglishGo 融入多種遊戲化機制，讓學習不再枯燥：</p>
        <ul style="margin:8px 0 8px 24px">
          <li><strong>連擊系統</strong>：連續答對會累積 Combo，3 連擊以上有特效和音效</li>
          <li><strong>經驗值 (XP)</strong>：每次練習都能獲得 XP</li>
          <li><strong>成就徽章</strong>：達成特定目標解鎖徽章（首次練習、連續 7 天、累積 500 XP 等）</li>
          <li><strong>音效回饋</strong>：答對、連擊、完成都有不同音效</li>
          <li><strong>撒花特效</strong>：完成一輪練習會有彩色紙屑慶祝</li>
        </ul>
